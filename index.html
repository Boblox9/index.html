:root{--bg:#0a0c10;--surf:#0d1117;--brd:#1a2332;--acc:#c8965a;--acc2:#e8c07a;--txt:#e8e4dc;--muted:#5a6478;--red:#c0392b;--sft:env(safe-area-inset-top,0px);--sfb:env(safe-area-inset-bottom,0px)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--txt);font-family:'Vollkorn',serif}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--brd);border-radius:2px}
#auth{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:20px;background-image:radial-gradient(ellipse at 20% 50%,rgba(200,150,90,.08) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(80,100,180,.05) 0%,transparent 50%);z-index:1000}
.acard{width:100%;max-width:360px;background:var(--surf);border:1px solid var(--brd);border-radius:20px;padding:36px 28px;box-shadow:0 32px 80px rgba(0,0,0,.7)}
.alogo{text-align:center;margin-bottom:28px}
.alogo-icon{font-size:40px}
.alogo-title{font-family:'Unbounded',sans-serif;font-size:22px;font-weight:900;letter-spacing:-.03em;margin-top:8px}
.alogo-title span{color:var(--acc)}
.alogo-sub{font-style:italic;font-size:13px;color:var(--muted);margin-top:4px}
.atabs{display:flex;background:var(--bg);border-radius:10px;padding:4px;gap:4px;margin-bottom:20px}
.atab{flex:1;padding:9px;border-radius:7px;border:none;cursor:pointer;font-family:'Unbounded',sans-serif;font-size:10px;font-weight:700;letter-spacing:.08em;transition:all .2s;background:transparent;color:var(--muted)}
.atab.on{background:var(--acc);color:#000}
.ainp{width:100%;background:var(--bg);border:1px solid var(--brd);color:var(--txt);font-family:'Vollkorn',serif;font-size:15px;padding:12px 14px;border-radius:10px;outline:none;transition:border-color .2s;margin-bottom:10px;display:block;-webkit-appearance:none}
.ainp:focus{border-color:var(--acc)}
.ainp::placeholder{color:var(--muted)}
.abtn{width:100%;padding:13px;background:var(--acc);border:none;border-radius:10px;color:#000;font-family:'Unbounded',sans-serif;font-weight:700;font-size:12px;letter-spacing:.05em;cursor:pointer;transition:all .2s;margin-top:4px;-webkit-appearance:none}
.abtn:active{background:var(--acc2);transform:scale(.98)}
.aerr{color:#e74c3c;font-size:12px;text-align:center;margin-bottom:10px;font-style:italic;display:none}
.afooter{text-align:center;margin-top:18px;font-size:11px;color:var(--muted);font-style:italic}
#app{display:none;flex-direction:column;height:100%}
.hdr{background:var(--surf);border-bottom:1px solid var(--brd);padding:10px 16px;padding-top:calc(10px + var(--sft));display:flex;align-items:center;gap:12px;flex-shrink:0;flex-wrap:wrap;z-index:500}
.hlogo{font-family:'Unbounded',sans-serif;font-weight:900;font-size:16px;letter-spacing:-.03em;white-space:nowrap}
.hlogo span{color:var(--acc)}
.huser{font-size:10px;color:var(--muted)}
.hsearch{position:relative;flex:1;min-width:120px}
.hsearch input{width:100%;background:var(--bg);border:1px solid var(--brd);color:var(--txt);font-family:'Vollkorn',serif;font-size:14px;padding:8px 12px 8px 32px;border-radius:18px;outline:none;-webkit-appearance:none;transition:border-color .2s}
.hsearch input:focus{border-color:var(--acc)}
.hsearch input::placeholder{color:var(--muted)}
.sico{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--muted);pointer-events:none}
.sdd{position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--surf);border:1px solid var(--brd);border-radius:12px;z-index:9999;max-height:260px;overflow-y:auto;box-shadow:0 12px 40px rgba(0,0,0,.8);display:none}
.sdd.open{display:block}
.sitem{padding:10px 12px;cursor:pointer;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--brd);transition:background .15s}
.sitem:last-child{border-bottom:none}
.sitem:active{background:rgba(200,150,90,.12)}
.sdot{width:8px;height:8px;border-radius:50%;background:var(--brd);flex-shrink:0}
.sdot.v{background:var(--acc)}
.sname{font-family:'Unbounded',sans-serif;font-size:11px;flex:1}
.spop{font-size:10px;color:var(--muted)}
.hstats{display:flex;align-items:center;gap:8px;flex-shrink:0}
.stnum{font-family:'Unbounded',sans-serif;font-size:18px;font-weight:700;color:var(--acc);line-height:1}
.stsep{color:var(--brd);font-size:16px}
.sttot{font-family:'Unbounded',sans-serif;font-size:12px;color:var(--muted)}
.lbtn{background:transparent;border:1px solid var(--brd);color:var(--muted);font-family:'Unbounded',sans-serif;font-size:9px;letter-spacing:.1em;padding:7px 10px;border-radius:7px;cursor:pointer;flex-shrink:0;-webkit-appearance:none;transition:all .2s}
.lbtn:active{border-color:var(--red);color:var(--red)}
.pbar{height:3px;background:var(--brd);overflow:hidden;flex-shrink:0}
.pfill{height:100%;background:linear-gradient(90deg,var(--acc),var(--acc2));transition:width .5s ease}
#mc{flex:1;position:relative;overflow:hidden}
#map{width:100%;height:100%;background:#080d14}
.leaflet-tile-pane{filter:brightness(.32) saturate(.35) hue-rotate(195deg)}
.leaflet-container{background:#080d14 !important}
.leaflet-control-zoom a{background:var(--surf) !important;border-color:var(--brd) !important;color:var(--txt) !important}
#cpop{position:absolute;top:16px;left:50%;transform:translateX(-50%);background:var(--surf);border:1px solid var(--brd);border-radius:16px;padding:18px 20px;z-index:800;min-width:200px;max-width:280px;width:90%;text-align:center;box-shadow:0 16px 48px rgba(0,0,0,.85);display:none}
#cpop.show{display:block}
.pcls{position:absolute;top:8px;right:12px;background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;line-height:1;padding:4px}
.pname{font-family:'Unbounded',sans-serif;font-size:15px;font-weight:700;color:var(--txt);margin-bottom:4px}
.ppop{font-size:12px;color:var(--muted);margin-bottom:2px}
.pdist{font-size:11px;color:var(--muted);margin-bottom:14px}
.pbtn{width:100%;padding:11px;border-radius:10px;font-family:'Unbounded',sans-serif;font-size:11px;font-weight:700;cursor:pointer;transition:all .2s;-webkit-appearance:none;border:none}
.pbtn.add{background:var(--acc);color:#000}
.pbtn.add:active{background:var(--acc2)}
.pbtn.rem{background:transparent;border:1px solid var(--brd);color:var(--muted)}
.pbtn.rem:active{border-color:var(--red);color:var(--red)}
#bs{background:var(--surf);border-top:1px solid var(--brd);height:48%;max-height:48%;display:flex;flex-direction:column;flex-shrink:0;padding-bottom:var(--sfb)}
.btabs{display:flex;border-bottom:1px solid var(--brd);flex-shrink:0}
.btab{flex:1;padding:12px 8px;background:none;border:none;cursor:pointer;font-family:'Unbounded',sans-serif;font-size:9px;font-weight:700;letter-spacing:.1em;color:var(--muted);border-bottom:2px solid transparent;transition:all .2s;-webkit-appearance:none}
.btab.on{color:var(--acc);border-bottom-color:var(--acc)}
.bcnt{flex:1;overflow-y:auto;padding:12px}
.tpan{display:none}
.tpan.on{display:block}
.crow{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;margin-bottom:5px;background:rgba(200,150,90,.07);border:1px solid rgba(200,150,90,.14);cursor:pointer;transition:background .15s}
.crow:active{background:rgba(200,150,90,.15)}
.cname{flex:1;font-family:'Unbounded',sans-serif;font-size:11px;color:var(--acc2)}
.cpop2{font-size:10px;color:var(--muted);font-style:italic}
.cdel{color:var(--muted);font-size:18px;line-height:1;padding:4px}
.drow{margin-bottom:16px}
.dhdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.dname{font-family:'Unbounded',sans-serif;font-size:9px;font-weight:700;letter-spacing:.08em;color:var(--acc)}
.dcnt{font-family:'Unbounded',sans-serif;font-size:10px;color:var(--acc)}
.dbar{height:3px;background:var(--brd);border-radius:2px;overflow:hidden}
.dfill{height:100%;background:linear-gradient(90deg,var(--acc),var(--acc2));border-radius:2px;transition:width .5s}
.ehint{color:var(--muted);font-style:italic;font-size:13px;text-align:center;padding:30px 16px;line-height:1.6}
.sftr{padding:10px 12px;border-top:1px solid var(--brd);flex-shrink:0}
.clrbtn{width:100%;background:transparent;border:1px solid var(--brd);color:var(--muted);font-family:'Unbounded',sans-serif;font-size:9px;letter-spacing:.1em;padding:10px;border-radius:8px;cursor:pointer;-webkit-appearance:none;transition:all .2s}
.clrbtn:active{border-color:var(--red);color:var(--red)}
#toast{position:fixed;bottom:calc(28px + var(--sfb));left:50%;transform:translateX(-50%) translateY(90px);background:var(--acc);color:#000;font-family:'Unbounded',sans-serif;font-size:11px;font-weight:700;padding:10px 22px;border-radius:50px;z-index:9999;transition:transform .35s cubic-bezier(.34,1.56,.64,1);pointer-events:none;white-space:nowrap}
#toast.show{transform:translateX(-50%) translateY(0)}
#ibnr{position:fixed;bottom:calc(16px + var(--sfb));left:16px;right:16px;background:var(--surf);border:1px solid var(--acc);border-radius:14px;padding:14px 16px;display:none;align-items:center;gap:12px;box-shadow:0 8px 32px rgba(0,0,0,.6);z-index:2000}
#ibnr.show{display:flex}
.itxt{flex:1;font-size:12px;color:var(--txt);line-height:1.4}
.itxt b{font-family:'Unbounded',sans-serif;font-size:11px;color:var(--acc)}
.iyes{background:var(--acc);color:#000;border:none;border-radius:8px;padding:9px 14px;font-family:'Unbounded',sans-serif;font-size:10px;font-weight:700;cursor:pointer}
.ino{background:transparent;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:4px}
@media(min-width:768px){
  #app{flex-direction:row;flex-wrap:wrap}
  .hdr{width:100%}
  #mc{flex:1;height:calc(100% - 57px)}
  #bs{width:320px;height:calc(100% - 57px);max-height:none;border-top:none;border-left:1px solid var(--brd)}
}
</style>
</head>

<div id="auth">
  <div class="acard">
    <div class="alogo">
      <div class="alogo-icon">🗺️</div>
      <div class="alogo-title">Моя <span>Россия</span></div>
      <div class="alogo-sub">карта личных путешествий</div>
    </div>
    <div class="atabs">
      <button class="atab on" id="tl" onclick="swTab('login')">ВОЙТИ</button>
      <button class="atab" id="tr" onclick="swTab('reg')">РЕГИСТРАЦИЯ</button>
    </div>
    <div class="aerr" id="aerr"></div>
    <input class="ainp" id="aln" type="text" placeholder="Логин" autocomplete="username" autocapitalize="none" autocorrect="off" spellcheck="false"/>
    <input class="ainp" id="apw" type="password" placeholder="Пароль" autocomplete="current-password"/>
    <input class="ainp" id="apw2" type="password" placeholder="Повтори пароль" autocomplete="new-password" style="display:none"/>
    <button class="abtn" id="asb" onclick="doAuth()">ВОЙТИ</button>
    <div class="afooter">Данные хранятся на устройстве</div>
  </div>
</div>

<div id="app">
  <div class="hdr">
    <div>
      <div class="hlogo">Моя <span>Россия</span></div>
      <div class="huser" id="huser"></div>
    </div>
    <div class="hsearch">
      <span class="sico">🔍</span>
      <input type="search" id="sinp" placeholder="Найти город..." autocomplete="off" autocapitalize="none" oninput="doSearch()" onblur="hideSearch()"/>
      <div class="sdd" id="sdd"></div>
    </div>
    <div class="hstats">
      <div class="stnum" id="vcnt">0</div>
      <div class="stsep">/</div>
      <div class="sttot" id="tcnt">0</div>
    </div>
    <button class="lbtn" onclick="doLogout()">ВЫЙТИ</button>
  </div>
  <div class="pbar"><div class="pfill" id="pfill" style="width:0%"></div></div>
  <div id="mc">
    <div id="map"></div>
    <div id="cpop">
      <button class="pcls" onclick="closePop()">×</button>
      <div class="pname" id="pname"></div>
      <div class="ppop" id="ppop2"></div>
      <div class="pdist" id="pdist"></div>
      <button class="pbtn" id="pbtn" onclick="togFromPop()"></button>
    </div>
  </div>
  <div id="bs">
    <div class="btabs">
      <button class="btab on" id="bt1" onclick="swBTab('vis')">✈️ ПОСЕЩЁННЫЕ</button>
      <button class="btab" id="bt2" onclick="swBTab('sta')">📊 ОКРУГА</button>
    </div>
    <div class="bcnt">
      <div class="tpan on" id="pvis"></div>
      <div class="tpan" id="psta"></div>
    </div>
    <div class="sftr"><button class="clrbtn" onclick="clearAll()">СБРОСИТЬ ВСЁ</button></div>
  </div>
</div>

<div id="toast"></div>
<div id="ibnr">
  <div class="itxt"><b>Добавить на экран</b><br>Работает как приложение</div>
  <button class="iyes" id="iyes">Добавить</button>
  <button class="ino" onclick="hideInstall()">×</button>
</div>

let user=null, vis=new Set(), map=null, mkrs={}, popCity=null, aTab='login', bTab='vis', dPmt=null;

// === UTILS ===
async function h256(s){
  try{const b=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(s));return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,"0")).join("");}
  catch(e){let h=0;for(let i=0;i<s.length;i++)h=Math.imul(31,h)+s.charCodeAt(i)|0;return Math.abs(h).toString(16).padStart(8,'0');}
}
function fp(p){return p>=1e6?(p/1e6).toFixed(1)+' млн':p>=1000?Math.round(p/1000)+' тыс':p+' чел';}
let tT;
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(tT);tT=setTimeout(()=>t.classList.remove('show'),2200);}
function aerr(m){const e=document.getElementById('aerr');e.textContent=m;e.style.display=m?'block':'none';}

// === AUTH ===
function swTab(t){
  aTab=t;
  document.getElementById('tl').classList.toggle('on',t==='login');
  document.getElementById('tr').classList.toggle('on',t==='reg');
  document.getElementById('apw2').style.display=t==='reg'?'block':'none';
  document.getElementById('asb').textContent=t==='login'?'ВОЙТИ':'СОЗДАТЬ АККАУНТ';
  aerr('');
}
async function doAuth(){
  const orig=document.getElementById('aln').value.trim();
  const uid=orig.toLowerCase().replace(/[^a-zа-яё0-9_]/gi,'');
  const pw=document.getElementById('apw').value;
  const pw2=document.getElementById('apw2').value;
  aerr('');
  if(!uid||!pw){aerr('Заполни все поля');return;}
  if(aTab==='login'){
    const users=JSON.parse(localStorage.getItem('mr_u')||'{}');
    if(!users[uid]){aerr('Пользователь не найден');return;}
    const hh=await h256(pw);
    if(users[uid].h!==hh){aerr('Неверный пароль');return;}
    startSess(uid,users[uid].nm||orig);
  } else {
    if(uid.length<3){aerr('Логин минимум 3 символа');return;}
    if(pw.length<4){aerr('Пароль минимум 4 символа');return;}
    if(pw!==pw2){aerr('Пароли не совпадают');return;}
    const users=JSON.parse(localStorage.getItem('mr_u')||'{}');
    if(users[uid]){aerr('Пользователь уже существует');return;}
    const hh=await h256(pw);
    users[uid]={h:hh,nm:orig};
    localStorage.setItem('mr_u',JSON.stringify(users));
    startSess(uid,orig);
  }
}
document.addEventListener('keydown',e=>{if(e.key==='Enter'&&document.getElementById('auth').style.display!='none')doAuth();});

function startSess(uid,nm){
  user={id:uid,nm};
  localStorage.setItem('mr_s',JSON.stringify({id:uid,nm}));
  const sv=localStorage.getItem('mr_v_'+uid);
  vis=new Set(sv?JSON.parse(sv):[]);
  document.getElementById('auth').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('huser').textContent='@'+nm;
  document.getElementById('tcnt').textContent=C.length;
  initMap();
  renderAll();
}
function doLogout(){
  user=null;vis=new Set();
  if(map){map.remove();map=null;mkrs={};}
  document.getElementById('app').style.display='none';
  document.getElementById('auth').style.display='flex';
  document.getElementById('aln').value='';
  document.getElementById('apw').value='';
  document.getElementById('apw2').value='';
  aerr('');
  localStorage.removeItem('mr_s');
}
// auto-login
(()=>{const s=localStorage.getItem('mr_s');if(s){try{const o=JSON.parse(s);if(o.id&&o.nm)startSess(o.id,o.nm);}catch(_){}})();

// === MAP ===
function mkIco(c,v){
  const p=c.p,s=p>1e6?13:p>5e5?10:p>2e5?8:p>1e5?6:5;
  const col=v?'#c8965a':'#1e2d40',brd=v?'#e8c07a':'#2e4060';
  const glow=v?'box-shadow:0 0 10px rgba(200,150,90,.85),0 0 3px rgba(200,150,90,.5);':'';
  const pin=v?`<div style="position:absolute;top:${-s*2-6}px;left:50%;transform:translateX(-50%);font-size:${Math.max(12,s+4)}px;line-height:1;pointer-events:none;">📍</div>`:'';
  return L.divIcon({className:'',html:`<div style="position:relative;">${pin}<div style="width:${s*2}px;height:${s*2}px;border-radius:50%;background:${col};border:2px solid ${brd};${glow}cursor:pointer;transition:all .25s;"></div></div>`,iconSize:[s*2,s*2],iconAnchor:[s,s]});
}
function initMap(){
  if(map)return;
  const mob=window.innerWidth<768;
  map=L.map('map',{center:[62,95],zoom:mob?3:4,minZoom:2,maxZoom:14,zoomControl:true,tap:true,touchZoom:true});
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OSM',subdomains:'abc',maxZoom:18}).addTo(map);
  C.forEach(c=>{
    const v=vis.has(c.n);
    const m=L.marker([c.la,c.lo],{icon:mkIco(c,v),title:c.n}).addTo(map);
    m.on('click',()=>openPop(c));
    mkrs[c.n]=m;
  });
  map.on('click',()=>closePop());
}
function openPop(c){
  popCity=c;const v=vis.has(c.n);
  document.getElementById('pname').textContent=c.n;
  document.getElementById('ppop2').textContent='👥 '+fp(c.p);
  document.getElementById('pdist').textContent=c.d+' ФО';
  const b=document.getElementById('pbtn');
  b.textContent=v?'✕ Убрать из посещённых':'✓ Был здесь!';
  b.className='pbtn '+(v?'rem':'add');
  document.getElementById('cpop').classList.add('show');
}
function closePop(){document.getElementById('cpop').classList.remove('show');popCity=null;}
function togFromPop(){if(popCity){togCity(popCity.n);closePop();}}
function togCity(n){
  if(vis.has(n)){vis.delete(n);toast('Убрано: '+n);}
  else{vis.add(n);toast('✓ '+n);}
  if(user)localStorage.setItem('mr_v_'+user.id,JSON.stringify([...vis]));
  const c=C.find(x=>x.n===n);
  if(c&&mkrs[n])mkrs[n].setIcon(mkIco(c,vis.has(n)));
  renderAll();
}
function flyTo(c){if(map)map.flyTo([c.la,c.lo],11,{duration:1.2});hideSearch();}
function clearAll(){
  if(!vis.size)return;
  if(!confirm('Сбросить все посещённые города?'))return;
  const prev=[...vis];vis.clear();
  if(user)localStorage.setItem('mr_v_'+user.id,'[]');
  prev.forEach(n=>{const c=C.find(x=>x.n===n);if(c&&mkrs[n])mkrs[n].setIcon(mkIco(c,false));});
  renderAll();toast('Список очищен');
}

// === RENDER ===
function renderAll(){
  const cnt=vis.size,tot=C.length,pct=Math.round(cnt/tot*100);
  document.getElementById('vcnt').textContent=cnt;
  document.getElementById('pfill').style.width=pct+'%';
  // visited tab
  const arr=[...vis].sort();
  const pv=document.getElementById('pvis');
  if(!arr.length){pv.innerHTML='<div class="ehint">Нажми на точку на карте,<br>чтобы отметить город 📍</div>';}
  else pv.innerHTML=arr.map(n=>{const c=C.find(x=>x.n===n);return`<div class="crow" onclick="flyTo(C.find(x=>x.n==='${n.replace(/'/g,"\\'")}'))"><div class="cname">${n}</div>${c?`<div class="cpop2">${fp(c.p)}</div>`:''}<div class="cdel" onclick="event.stopPropagation();togCity('${n.replace(/'/g,"\\'")}')">×</div></div>`;}).join('');
  // stats tab
  const ds={};
  C.forEach(c=>{if(!ds[c.d])ds[c.d]={t:0,v:0};ds[c.d].t++;if(vis.has(c.n))ds[c.d].v++;});
  document.getElementById('psta').innerHTML=Object.entries(ds).map(([d,s])=>{const pct=s.t?Math.round(s.v/s.t*100):0;return`<div class="drow"><div class="dhdr"><div class="dname">${d}</div><div class="dcnt">${s.v}/${s.t}</div></div><div class="dbar"><div class="dfill" style="width:${pct}%"></div></div></div>`;}).join('');
}

// === SEARCH ===
let sT;
function doSearch(){
  clearTimeout(sT);sT=setTimeout(()=>{
    const q=document.getElementById('sinp').value.trim().toLowerCase();
    const dd=document.getElementById('sdd');
    if(!q){dd.classList.remove('open');return;}
    const r=C.filter(c=>c.n.toLowerCase().includes(q)).slice(0,10);
    if(!r.length){dd.classList.remove('open');return;}
    dd.innerHTML=r.map(c=>`<div class="sitem" onmousedown="flyTo(C.find(x=>x.n==='${c.n.replace(/'/g,"\\'")}'));document.getElementById('sinp').value='${c.n.replace(/'/g,"\\'")}';"><div class="sdot ${vis.has(c.n)?'v':''}"></div><div class="sname">${c.n}</div><div class="spop">${fp(c.p)}</div></div>`).join('');
    dd.classList.add('open');
  },150);
}
function hideSearch(){setTimeout(()=>document.getElementById('sdd').classList.remove('open'),200);}

// === TABS ===
function swBTab(t){
  bTab=t;
  ['vis','sta'].forEach(id=>{document.getElementById('bt'+(id==='vis'?'1':'2')).classList.toggle('on',t===id);document.getElementById('p'+id).classList.toggle('on',t===id);});
}

// === PWA INSTALL ===
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();dPmt=e;document.getElementById('ibnr').classList.add('show');});
document.getElementById('iyes').addEventListener('click',async()=>{if(dPmt){dPmt.prompt();await dPmt.userChoice;dPmt=null;hideInstall();}});
function hideInstall(){document.getElementById('ibnr').classList.remove('show');}
window.addEventListener('appinstalled',hideInstall);
</script>
